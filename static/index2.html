<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Laura Giudici - Desarrolladora</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Crimson+Text:ital@0;1&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Crimson Text", serif;
                background-color: var(--color-paper);
                color: var(--color-ink);
                line-height: 1.7;
                background-image:
                    repeating-linear-gradient(
                        75deg,
                        transparent,
                        transparent 2px,
                        rgba(43, 36, 22, 0.03) 2px,
                        rgba(43, 36, 22, 0.03) 4px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        transparent,
                        transparent 2px,
                        rgba(43, 36, 22, 0.02) 2px,
                        rgba(43, 36, 22, 0.02) 4px
                    );
            }

            .container {
                max-width: 680px;
                margin: 0 auto;
                padding: 4rem 2.5rem;
                flex: 1;
                position: relative;
            }

            container::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
                max-width: 700px;
                height: 100%;
                border-left: 1px dashed var(--color-aged);
                border-right: 1px dashed var(--color-aged);
                opacity: 0.3;
                pointer-events: none;
            }

            .content-wrapper {
                position: relative;
                z-index: 1;
            }

            .header {
                margin-bottom: 2.5rem;
                animation: fadeInUp 0.8s ease;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/@babel/standalone/babel.min.js"
        ></script>

        <script type="text/babel">
            const { useState, useEffect } = React;

            function Portfolio() {
                const [data, setData] = useState(null);
                const [loading, setLoading] = useState(true);
                const [error, setError] = useState(null);

                useEffect(() => {
                    fetch("/api/portfolio")
                        .then((res) => res.json())
                        .then((data) => {
                            setData(data);
                            setLoading(false);
                        })
                        .catch((err) => {
                            setError(err.message);
                            setLoading(false);
                        });
                }, []);

                if (!data) return null;

                return (
                    <>
                        <div className="container">
                            <div className="content-wrapper">
                                {/* Header */}
                                <header className="header">
                                    <h1>hola</h1>
                                    <h2>{data.name}</h2>
                                </header>
                            </div>
                        </div>
                    </>
                );
            }
            ReactDOM.render(<Portfolio />, document.getElementById("root"));
        </script>
    </body>
</html>
