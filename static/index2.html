<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Laura Giudici - Desarrolladora</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Crimson+Text:ital@0;1&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Crimson Text", serif;
                background-color: var(--color-paper);
                color: var(--color-ink);
                line-height: 1.7;
                background-image:
                    repeating-linear-gradient(
                        45deg,
                        transparent,
                        transparent 2px,
                        rgba(43, 36, 22, 0.03) 2px,
                        rgba(43, 36, 22, 0.03) 10px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        transparent,
                        transparent 2px,
                        rgba(43, 36, 22, 0.02) 2px,
                        rgba(43, 36, 22, 0.02) 24px
                    );
            }

            :root {
                --color-paper: #f4ede4;
                --color-ink: #2b2416;
                --color-aged: #ba4f58;
                --color-shadow: rgba(43, 36, 22, 0.1);
                --color-tape: #e8d5be;
            }

            #root {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            h1 {
                font-family: "Courier Prime", monospace;
                font-size: clamp(2rem, 6vw, 3.5rem);
                font-weight: 700;
                line-height: 1.1;
                margin-bottom: 0.3rem;
                letter-spacing: 0.02em;
                position: relative;
                text-transform: uppercase;
            }

            h1::after {
                content: "";
                display: block;
                width: 60px;
                height: 2px;
                background-color: var(--color-aged);
                margin-top: 0.5rem;
                animation: slideIn 0.8s ease 0.3s both;
            }

            h2 {
                font-family: "Courier Prime", monospace;
                font-size: clamp(1.3rem, 4vw, 1.8rem);
                font-weight: 700;
                margin-top: 2.5rem;
                margin-bottom: 1rem;
                text-transform: uppercase;
                letter-spacing: 0.03em;
                position: relative;
                padding-bottom: 0.8rem;
            }

            h2::before {
                content: "▪ ";
                color: var(--color-aged);
                margin-right: 0.5rem;
            }

            h2::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 2px;
                background: repeating-linear-gradient(
                    90deg,
                    var(--color-aged),
                    var(--color-aged) 10px,
                    transparent 20px,
                    transparent 20px
                );
            }
            .container {
                max-width: 680px;
                margin: 0 auto;
                padding: 4rem 2.5rem;
                flex: 1;
                position: relative;
            }

            container::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
                max-width: 700px;
                height: 100%;
                border-left: 1px dashed var(--color-aged);
                border-right: 1px dashed var(--color-aged);
                opacity: 0.3;
                pointer-events: none;
            }

            .content-wrapper {
                position: relative;
                z-index: 1;
            }

            .header {
                margin-bottom: 2.5rem;
                animation: fadeInUp 0.8s ease;
            }

            .bigstamp {
                display: inline-block;
                font-family: "Courier Prime", monospace;
                font-size: 10.7rem;
                color: var(--color-aged);
                border: 2px solid var(--color-aged);
                padding: 0.5rem 0.8rem;
                margin-bottom: 1rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                transform: rotate(-15deg);
                opacity: 0.7;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/@babel/standalone/babel.min.js"
        ></script>

        <script type="text/babel">
            const { useState, useEffect } = React;

            function Portfolio() {
                const [data, setData] = useState(null);
                const [loading, setLoading] = useState(true);
                const [error, setError] = useState(null);

                useEffect(() => {
                    fetch("/api/portfolio")
                        .then((res) => res.json())
                        .then((data) => {
                            setData(data);
                            setLoading(false);
                        })
                        .catch((err) => {
                            setError(err.message);
                            setLoading(false);
                        });
                }, []);

                if (!data) return null;

                return (
                    <>
                        <div className="container">
                            <div className="content-wrapper">
                                {/* Header */}
                                <header className="header">
                                    <h1>hola</h1>
                                    <h2>{data.name}</h2>
                                    <div className="bigstamp">
                                        SITIO EN CONSTRUCCIÓN
                                    </div>
                                </header>
                            </div>
                        </div>
                    </>
                );
            }
            ReactDOM.render(<Portfolio />, document.getElementById("root"));
        </script>
    </body>
</html>
