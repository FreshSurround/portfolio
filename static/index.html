<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Neon Informática - Desarrollo</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Crimson+Text:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="root"></div>
        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/@babel/standalone/babel.min.js"
        ></script>

        <script type="text/babel">
            const { useState, useEffect } = React;

            function Portfolio() {
                const [data, setData] = useState(null);
                const [loading, setLoading] = useState(true);
                const [error, setError] = useState(null);

                useEffect(() => {
                    fetch("/api/portfolio")
                        .then((res) => res.json())
                        .then((data) => {
                            setData(data);
                            setLoading(false);
                        })
                        .catch((err) => {
                            setError(err.message);
                            setLoading(false);
                        });
                }, []);

                if (!data) return null;

                return (
                    <>
                        <div className="container">
                            <div className="content-wrapper">
                                {/* Header */}
                                <header className="header">
                                    <h1>{data.name}</h1>

                                    <section className="section intro">
                                        <h2>Sobre mí</h2>
                                        <p>{data.about_1}</p>
                                        <p>{data.about_2}</p>
                                    </section>
                                </header>

                                <section className="section">
                                    <h2>Proyectos destacados</h2>
                                    {data.projects.map((project, idx) => (
                                        <div key={idx} className="project">
                                            <div className="project-title">
                                                {project.title}
                                            </div>
                                            <div className="project-desc">
                                                {project.description}
                                            </div>
                                            <div className="project-tech">
                                                {project.technologies.map(
                                                    (tech, tidx) => (
                                                        <span
                                                            key={tidx}
                                                            className="tech-tag"
                                                        >
                                                            {tech}
                                                        </span>
                                                    ),
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </section>

                                <section className="section">
                                    <h2>Tecnologías</h2>
                                    <div className="skills-grid">
                                        <div className="skill-category">
                                            <h3>Lenguajes</h3>
                                            <ul>
                                                {data.skills.languages.map(
                                                    (lang, idx) => (
                                                        <li key={idx}>
                                                            {lang}
                                                        </li>
                                                    ),
                                                )}
                                            </ul>
                                        </div>
                                        <div className="skill-category">
                                            <h3>Frameworks</h3>
                                            <ul>
                                                {data.skills.frameworks.map(
                                                    (fw, idx) => (
                                                        <li key={idx}>{fw}</li>
                                                    ),
                                                )}
                                            </ul>
                                        </div>
                                    </div>
                                    <div
                                        className="skill-category"
                                        style={{ gridColumn: "1 / -1" }}
                                    >
                                        <h3>Herramientas</h3>
                                        <ul
                                            style={{
                                                display: "grid",
                                                gridTemplateColumns: "1fr 1fr",
                                                gap: "0.5rem",
                                            }}
                                        >
                                            {data.skills.tools.map(
                                                (tool, idx) => (
                                                    <li key={idx}>{tool}</li>
                                                ),
                                            )}
                                        </ul>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </>
                );
            }
            ReactDOM.render(<Portfolio />, document.getElementById("root"));
        </script>
    </body>
</html>
